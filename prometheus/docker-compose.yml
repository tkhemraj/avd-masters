# Monitoring stack: Prometheus + Alertmanager + AVD Masters exporter
#
# Usage:
#   export TEAMS_WEBHOOK_CRITICAL="https://outlook.office.com/webhook/..."
#   export TEAMS_WEBHOOK_WARNING="https://outlook.office.com/webhook/..."
#   export TEAMS_WEBHOOK_META="https://outlook.office.com/webhook/..."
#   docker-compose up -d
#
# AVD Masters credentials are passed via a config.yaml volume mount.
# Never put webhook URLs or platform passwords in this file — use env vars
# or Docker secrets (see the secrets: block commented out below).

services:

  avd-masters:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "-m", "avd_masters", "--exporter-only", "--config", "/config/config.yaml"]
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    environment:
      # Azure credentials (for AVD collector) — use a service principal
      - AZURE_CLIENT_ID
      - AZURE_CLIENT_SECRET
      - AZURE_TENANT_ID
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/metrics"]
      interval: 60s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml.example:/etc/prometheus/prometheus.yml:ro
      - ./alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    restart: unless-stopped
    depends_on:
      - avd-masters

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --cluster.advertise-address=0.0.0.0:9093
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    environment:
      - TEAMS_WEBHOOK_CRITICAL
      - TEAMS_WEBHOOK_WARNING
      - TEAMS_WEBHOOK_META
    restart: unless-stopped

volumes:
  prometheus_data:
  alertmanager_data:

# ── Docker secrets alternative (Swarm / production) ────────────────────────
# secrets:
#   teams_webhook_critical:
#     external: true
#   teams_webhook_warning:
#     external: true
